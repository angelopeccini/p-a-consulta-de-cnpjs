databases:
  - name: pa-cnpj-db
    plan: basic-256mb
services:
  - type: web
    name: pa-cnpj-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: pa-cnpj-db, property: connectionString }
      - key: API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://peccini-inteligencia-empresarial.angelopeccini.chatgpt.site
  - type: cron
    name: pa-pgfn-sync
    runtime: docker
    schedule: "0 3 1 * *"
    dockerCommand: npm run sync:pgfn
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: pa-cnpj-db, property: connectionString }
      - key: PGFN_DATA_URLS
        sync: false
